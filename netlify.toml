# Netlify Configuration File
# This file configures build settings for Netlify deployment

[build]
  # Build command for Next.js static export
  command = "npm run build"
  
  # Output directory (Next.js static export outputs to 'out' directory)
  publish = "out"

[build.environment]
  # Node.js version
  NODE_VERSION = "18"

# Shopify mandatory GDPR compliance webhooks → Netlify Functions
[[redirects]]
  from = "/portal/webhooks/customers/data_request"
  to = "/.netlify/functions/shopify-webhook-customers-data-request"
  status = 200
  force = true

[[redirects]]
  from = "/portal/webhooks/customers/redact"
  to = "/.netlify/functions/shopify-webhook-customers-redact"
  status = 200
  force = true

[[redirects]]
  from = "/portal/webhooks/shop/redact"
  to = "/.netlify/functions/shopify-webhook-shop-redact"
  status = 200
  force = true

# Finit OS interactive intake — chat is a Netlify Edge Function (Deno),
# the rest are regular Netlify Functions (Node). Edge avoids AWS Lambda
# Streaming's framing 502s; see netlify/edge-functions/intake-chat.ts.
[[edge_functions]]
  path = "/api/intake/chat"
  function = "intake-chat"

[[redirects]]
  from = "/api/intake/state"
  to = "/.netlify/functions/intake-state"
  status = 200
  force = true

[[redirects]]
  from = "/api/intake/transcribe"
  to = "/.netlify/functions/intake-transcribe"
  status = 200
  force = true

[[redirects]]
  from = "/api/intake/submit"
  to = "/.netlify/functions/intake-submit"
  status = 200
  force = true

[[redirects]]
  from = "/api/lead-magnet/start"
  to = "/.netlify/functions/lead-magnet-start"
  status = 200
  force = true

# Redirect rules for Next.js App Router with trailing slashes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Note: Environment variables should be set in Netlify Dashboard
# Go to: Site settings → Environment variables
# Do NOT put sensitive values in this file if it's committed to version control
